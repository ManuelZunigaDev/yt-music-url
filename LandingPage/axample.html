<!DOCTYPE html>
<html>
<head>
<title>Gestor de Tareas</title>
</head>
<body>
<h1>Lista de Tareas</h1>
<input id="nombre" placeholder="Nombre de la tarea">
<input id="desc" placeholder="Descripción">
<button onclick="agregarTarea()">Agregar</button>
<ul id="lista"></ul>
<script>
const API_KEY = "TU_API_KEY";
const BASE_ID = "TU_BASE_ID";
const TABLA = "Tareas";
const URL = `https://api.airtable.com/v0/${BASE_ID}/${TABLA}`;
async function obtenerTareas() {
const res = await fetch(URL, {
headers: { Authorization: `Bearer ${API_KEY}` }
});
const data = await res.json();
const lista = document.getElementById("lista");
lista.innerHTML = "";

data.records.forEach(tarea => {
const li = document.createElement("li");
li.textContent = tarea.fields.Nombre;
li.onclick = () => completarTarea(tarea.id);
lista.appendChild(li);
});
}
async function agregarTarea() {
const nombre = document.getElementById("nombre").value;
const desc = document.getElementById("desc").value;
await fetch(URL, {
method: "POST",
headers: {
Authorization: `Bearer ${API_KEY}`,
"Content-Type": "application/json"
},
body: JSON.stringify({
fields: {
Nombre: nombre,
Descripción: desc,
Estado: false
}
})
});
obtenerTareas();
}
async function completarTarea(id) {
await fetch(`${URL}/${id}`, {
method: "PATCH",
headers: {
Authorization: `Bearer ${API_KEY}`,
"Content-Type": "application/json"
},
body: JSON.stringify({
fields: {
Estado: true
}
})
});
obtenerTareas();
}
obtenerTareas();
</script>
</body>
</html>
